    <header>
      <div class="container top-nav">

    <main class="container">
      <h1 class="section-title">Contact</h1>
      <section class="contact-wrap">
        <article class="mini-card">
          <p>Feel free to reach out if you’d like to discuss opportunities or my work.</p>
          <p><strong>Email:</strong> <a href="mailto:harini.avs1@gmail.com">harini.avs1@gmail.com</a></p>

        </article>
        <article class="mini-card">
          <form data-mail-form>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" />
            <label for="email">Email*</label>
            <input id="email" name="email" type="email" required />
            <label for="message">Message*</label>
            <textarea id="message" name="message" required></textarea>
            <button class="btn" type="submit">Send</button>
          </form>
        </article>
      </section>
      <div class="footer-line"></div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="links">
          <span class="dot">•</span><a href="mailto:harini.avs1@gmail.com">Email</a>
