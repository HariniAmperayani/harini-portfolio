<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <div class="container nav">
          <div class="brand">
            <img src="assets/img/2.png" alt="Harini logo" width="36" height="36" />
            <span>Harini Amperayani</span>
          </div>
          <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">My work</a>
            <a href="resume.html">Resume</a>
            <a class="active" href="contact.html">Contact</a>
          </nav>
        </div>
      </header>

      <main class="container">
        <section class="section">
          <h1>Contact</h1>
          <p>Feel free to reach out if you’d like to discuss opportunities or my work.</p>
        </section>

        <section class="contact-cards section">
          <article class="contact-card">
            <h3>Say hi</h3>
            <p><strong>Email:</strong> <a href="mailto:harini.avs1@gmail.com">harini.avs1@gmail.com</a></p>
            <p>
              <strong>LinkedIn:</strong>
              <a href="https://www.linkedin.com/in/harini-avs103/" target="_blank" rel="noreferrer noopener"
                >harini-amperayani</a
              >
            </p>
          </article>
          <article class="contact-card">
            <h3>Send a message</h3>
            <form>
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" />

              <label for="email">Email*</label>
              <input type="email" id="email" name="email" placeholder="you@email.com" required />

              <label for="message">Message*</label>
              <textarea id="message" name="message" placeholder="Tell me about the opportunity" required></textarea>

              <button class="btn" type="submit">Send</button>
            </form>
          </article>
        </section>
      </main>

      <footer>
        <div class="container">
          <div class="links">
            <a href="mailto:harini.avs1@gmail.com">Email</a>
            <a href="https://www.linkedin.com/in/harini-avs103/" target="_blank" rel="noreferrer noopener">LinkedIn</a>
          </div>
          <p>© 2026 Harini Amperayani</p>
        </div>
      </footer>
    </div>
